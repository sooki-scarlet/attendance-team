<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⏱ 근태관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f2ee;--sf:#fff;--sf2:#f7f7f4;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.15);
  --tx:#1a1a1a;--tx2:#555;--tx3:#999;
  --gn:#3B6D11;--gn-bg:#EAF3DE;--gn-lt:#C0DD97;--gn-m:#4a7d18;
  --am:#854F0B;--am-bg:#FDF6EC;--am-lt:#FAC775;
  --bl:#185FA5;--bl-bg:#EEF5FC;--bl-lt:#B5D4F4;
  --rd:#993C1D;--rd-bg:#FBF0ED;--rd-lt:#F5C4B3;
  --pu:#534AB7;--pu-bg:#F4F3FD;
  --cy:#0E7490;--cy-bg:#ECFEFF;--cy-lt:#A5F3FC;
}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5;-webkit-text-size-adjust:100%;}
*{font-family:inherit;}
input,select,textarea{background:var(--sf);border:0.5px solid var(--bd2);color:var(--tx);
  border-radius:6px;padding:7px 10px;outline:none;font-size:12px;width:100%;-webkit-appearance:none;}
input:focus,select:focus{border-color:var(--gn-m);box-shadow:0 0 0 2px rgba(74,125,24,.1);}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer;}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;
  padding:6px 12px;font-size:12px;font-weight:500;border:0.5px solid var(--bd2);
  border-radius:6px;background:var(--sf);color:var(--tx2);white-space:nowrap;transition:background .12s;}
.btn:hover,.btn:active{background:var(--sf2);}
.btn-gn{background:var(--gn-bg);color:var(--gn);border-color:var(--gn-lt);}
.btn-gn:hover{background:var(--gn-lt);}
.btn-bl{background:var(--bl-bg);color:var(--bl);border-color:var(--bl-lt);}
.btn-rd{background:var(--rd-bg);color:var(--rd);border-color:var(--rd-lt);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-pill{border-radius:20px;}
.p-db{background:var(--am-bg);color:var(--am);border-color:var(--am-lt);}
.p-da{background:var(--gn-bg);color:var(--gn);border-color:var(--gn-lt);}
.p-sp{background:var(--sf2);color:var(--tx3);border-color:var(--bd);}
.p-sc{background:var(--gn-bg);color:var(--gn);border-color:var(--gn-lt);}
.p-del{color:var(--rd);border-color:var(--rd-lt);background:var(--rd-bg);}
.card{background:var(--sf);border:0.5px solid var(--bd);border-radius:10px;overflow:hidden;}
.cp{padding:14px 16px;}
.ct{font-size:12px;font-weight:600;margin-bottom:12px;}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:500;white-space:nowrap;border:0.5px solid transparent;}
.tabbar{display:flex;background:var(--sf2);border:0.5px solid var(--bd);border-radius:7px;padding:3px;gap:2px;}
.tabit{flex:1;padding:7px 4px;text-align:center;border-radius:5px;cursor:pointer;font-size:12px;
  color:var(--tx3);border:0.5px solid transparent;transition:all .12s;user-select:none;}
.tabit.on{background:var(--sf);color:var(--tx);font-weight:600;border-color:var(--bd);}
.tgl{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;
  background:var(--sf2);border:0.5px solid var(--bd2);transition:background .2s;}
.tgl.on{background:var(--gn-m);border-color:var(--gn-m);}
.tglb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;
  background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tgl.on .tglb{left:19px;}
.barbg{height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:8px;}
.barfill{height:100%;border-radius:2px;transition:width .6s;}
.tbwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:9px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--tx3);
  border-bottom:0.5px solid var(--bd);white-space:nowrap;background:var(--sf2);}
td{padding:9px 10px;border-bottom:0.5px solid var(--bd);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(0,0,0,.014);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;}
.fr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sec{margin-bottom:10px;}
/* 요약 배너 */
.sumbar{background:var(--sf);border:0.5px solid var(--bd);border-radius:8px;padding:10px 14px;
  display:flex;align-items:stretch;margin-bottom:10px;overflow-x:auto;}
.sumitem{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 14px;
  border-right:0.5px solid var(--bd);white-space:nowrap;flex-shrink:0;}
.sumitem:last-child{border-right:none;}
.sumlb{font-size:10px;color:var(--tx3);}
.sumvl{font-size:15px;font-weight:700;}
/* 경고 */
.warn{background:var(--am-bg);border:0.5px solid var(--am-lt);border-radius:8px;
  padding:9px 14px;font-size:12px;color:var(--am);margin-bottom:8px;}
.err{background:var(--rd-bg);border:0.5px solid var(--rd-lt);border-radius:8px;
  padding:9px 14px;font-size:12px;color:var(--rd);margin-bottom:8px;}
.info{background:var(--bl-bg);border:0.5px solid var(--bl-lt);border-radius:8px;
  padding:9px 14px;font-size:12px;color:var(--bl);margin-bottom:8px;}
/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;
  padding:10px 22px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.25);pointer-events:none;white-space:nowrap;}
/* 로딩 오버레이 */
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(242,242,238,.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:8888;gap:12px;}
.spinner{width:28px;height:28px;border:2.5px solid var(--gn-lt);border-top-color:var(--gn);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* 달력 */
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.calcel{border-radius:6px;padding:5px 3px 4px;cursor:pointer;background:var(--sf2);
  border:0.5px solid var(--bd);min-height:46px;text-align:center;transition:all .1s;}
.calcel:hover{border-color:var(--bd2);}
.calcel.sel{background:var(--gn-bg);border-color:var(--gn-lt);}
.calcel.today{border-color:var(--bl-lt);background:var(--bl-bg);}
/* 휴가 이벤트 카드 */
.lv-card{background:var(--sf2);border-radius:7px;padding:10px 12px;margin-bottom:8px;
  border:0.5px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.lv-plus{border-left:3px solid var(--gn);}
.lv-minus{border-left:3px solid var(--bl);}
.lv-base{border-left:3px solid var(--am);}
/* 반응형 */
@media(max-width:640px){
  .g2{grid-template-columns:1fr;}.g4{grid-template-columns:1fr 1fr;}
  .g3{grid-template-columns:1fr 1fr;}.hm{display:none;}
  .tabit{font-size:11px;padding:6px 2px;}.sumitem{padding:0 10px;}
}
</style>
</head>
<body>
<div id="app" style="padding:12px 12px 72px;min-height:100vh;"></div>

<script>
'use strict';
// ══════════════════════════════════════════════════════
// 유형 분류
// ADD: 연장근무·야간근무·휴일근무 → 가산(+)
// SUB: 대체휴무·연차·반차·외출·조퇴·보상휴가 → 차감(−)
// 시간 입력은 항상 양수, 부호는 자동 처리
// ══════════════════════════════════════════════════════
const ADD=['연장근무','야간근무','휴일근무'];
const SUB=['대체휴무','연차','반차','외출','조퇴','보상휴가'];
const isAdd=t=>ADD.includes(t);
const isSub=t=>SUB.includes(t);

const TS={
  '연장근무':{bg:'var(--am-bg)',tx:'var(--am)',dot:'#EF9F27'},
  '야간근무':{bg:'var(--pu-bg)',tx:'var(--pu)',dot:'#AFA9EC'},
  '휴일근무':{bg:'var(--rd-bg)',tx:'var(--rd)',dot:'#F0997B'},
  '대체휴무':{bg:'var(--bl-bg)',tx:'var(--bl)',dot:'#85B7EB'},
  '연차':    {bg:'var(--gn-bg)',tx:'var(--gn)',dot:'#97C459'},
  '반차':    {bg:'var(--gn-bg)',tx:'#27500A', dot:'#C0DD97'},
  '외출':    {bg:'var(--am-bg)',tx:'var(--am)',dot:'#FAC775'},
  '조퇴':    {bg:'var(--am-bg)',tx:'#633806', dot:'#FAC775'},
  '보상휴가':{bg:'var(--cy-bg)',tx:'var(--cy)',dot:'#38bdf8'},
  '기타':    {bg:'var(--sf2)', tx:'var(--tx3)',dot:'#B4B2A9'},
};
const TL=['연장근무','야간근무','휴일근무','대체휴무','연차','반차','외출','조퇴','보상휴가','기타'];
const LV_TYPES=['연차','보상휴가','대체휴가','기타휴가'];
const WD=['일','월','화','수','목','금','토'];
const p2=n=>String(n).padStart(2,'0');
const toDS=d=>`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const todayDS=()=>toDS(new Date());
const addM=(ds,n)=>{const d=new Date(ds+'T00:00:00');d.setMonth(d.getMonth()+n);return toDS(d);};
const diffD=(a,b)=>(new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/864e5;
let _id=0; const uid=()=>'C'+(Date.now())+(_id++);

// ══════════════════════════════════════════════════════
// 앱 상태
// ══════════════════════════════════════════════════════
// gasUrl: Apps Script Web App URL
let gasUrl = localStorage.getItem('gasUrl') || '';

// 데이터 (구글 시트에서 로드, 로컬캐시 보조)
let recs   = [];   // 근태 기록
let leaves = [];   // 휴가 기준/이벤트 로그
let cfg    = {     // 설정
  name:'김숙희', annualTotal:15, compTotal:0,
  otLimit:20, weekLimit:52, dailyH:8, year:2026,
};

// UI 상태
let view='dash', showAll=true, fm='2026-04';
let selDay=null, editId=null, adding=false;
let newRec={date:'',type:'연장근무',memo:'',hours:2,draft:'기전',status:'예정',linkedDate:''};
let showCfg=false, expFrom='2026-04-01', expTo='2026-04-30';
let syncing=false, lastSync=null;

// 로컬 캐시 복구
function loadCache(){
  try{
    const cr=localStorage.getItem('cache_recs');   if(cr)recs=JSON.parse(cr);
    const cl=localStorage.getItem('cache_leaves'); if(cl)leaves=JSON.parse(cl);
    const cc=localStorage.getItem('cache_cfg');    if(cc)cfg={...cfg,...JSON.parse(cc)};
    const ls=localStorage.getItem('lastSync');     if(ls)lastSync=ls;
  }catch(e){}
}
function saveCache(){
  try{
    localStorage.setItem('cache_recs',  JSON.stringify(recs));
    localStorage.setItem('cache_leaves',JSON.stringify(leaves));
    localStorage.setItem('cache_cfg',   JSON.stringify(cfg));
    lastSync=new Date().toLocaleString('ko-KR');
    localStorage.setItem('lastSync', lastSync);
  }catch(e){}
}
loadCache();

// ══════════════════════════════════════════════════════
// GAS API 통신
// ══════════════════════════════════════════════════════
async function gasGet(params){
  if(!gasUrl) throw new Error('GAS URL이 설정되지 않았습니다');
  const url=gasUrl+'?'+Object.entries(params).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
  const r=await fetch(url);
  return r.json();
}
async function gasPost(body){
  if(!gasUrl) throw new Error('GAS URL이 설정되지 않았습니다');
  const r=await fetch(gasUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return r.json();
}

// 전체 데이터 구글 시트에서 불러오기
async function loadFromSheet(){
  if(!gasUrl){toast('연동 탭에서 GAS URL을 먼저 설정하세요','#993C1D');return;}
  showLoading('구글 시트에서 불러오는 중...');
  try{
    const d=await gasGet({action:'load'});
    if(d.status!=='ok') throw new Error(d.message);
    // 설정
    if(d.config){
      cfg={...cfg,...d.config};
      if(cfg.annualTotal)cfg.annualTotal=Number(cfg.annualTotal);
      if(cfg.compTotal)cfg.compTotal=Number(cfg.compTotal);
      if(cfg.otLimit)cfg.otLimit=Number(cfg.otLimit);
      if(cfg.weekLimit)cfg.weekLimit=Number(cfg.weekLimit);
      if(cfg.dailyH)cfg.dailyH=Number(cfg.dailyH);
    }
    if(d.records) recs=d.records;
    if(d.leaves)  leaves=d.leaves;
    saveCache();
    toast('✓ 데이터 로드 완료 ('+recs.length+'건)','#3B6D11');
  }catch(e){
    toast('로드 실패: '+e.message,'#993C1D');
  }finally{hideLoading();render();}
}

// 근태 기록 추가
async function apiAddRecord(rec){
  if(!gasUrl){recs.push(rec);saveCache();return {status:'ok',id:rec.id};}
  const r=await gasPost({action:'addRecord',record:rec});
  if(r.status==='ok'){recs.push({...rec,id:r.id});saveCache();}
  return r;
}
// 근태 기록 수정
async function apiUpdateRecord(rec){
  if(!gasUrl){recs=recs.map(r=>r.id===rec.id?rec:r);saveCache();return {status:'ok'};}
  const r=await gasPost({action:'updateRecord',record:rec});
  if(r.status==='ok'){recs=recs.map(x=>x.id===rec.id?rec:x);saveCache();}
  return r;
}
// 근태 기록 삭제
async function apiDeleteRecord(id){
  if(!gasUrl){recs=recs.filter(r=>r.id!==id);saveCache();return {status:'ok'};}
  const r=await gasPost({action:'deleteRecord',id});
  if(r.status==='ok'){recs=recs.filter(x=>x.id!==id);saveCache();}
  return r;
}
// 휴가 이벤트 추가
async function apiAddLeave(ev){
  if(!gasUrl){leaves.push(ev);saveCache();return {status:'ok',id:ev.id};}
  const r=await gasPost({action:'addLeaveEvent',event:ev});
  if(r.status==='ok'){leaves.push({...ev,id:r.id});saveCache();}
  return r;
}
// 휴가 이벤트 삭제
async function apiDeleteLeave(id){
  if(!gasUrl){leaves=leaves.filter(l=>l.id!==id);saveCache();return {status:'ok'};}
  const r=await gasPost({action:'deleteLeaveEvent',id});
  if(r.status==='ok'){leaves=leaves.filter(l=>l.id!==id);saveCache();}
  return r;
}
// 설정 저장
async function apiSaveConfig(){
  saveCache();
  if(!gasUrl) return;
  await gasPost({action:'saveConfig',config:cfg});
}

// ══════════════════════════════════════════════════════
// 통계 계산 — 전체 기간 누적 기준
// ══════════════════════════════════════════════════════
function calcStats(){
  const act=recs.filter(r=>showAll||r.status==='확정');
  const mo=act.filter(r=>r.date.startsWith(fm));
  const td=todayDS();

  // ── 월별 시간외 (연장+야간+휴일) ─ 월 단위가 맞음
  const ot=mo.filter(r=>isAdd(r.type)).reduce((s,r)=>s+r.hours,0);

  // ── 금주 근무시간 ──
  const dw=new Date().getDay();
  const wMon=new Date();wMon.setDate(wMon.getDate()-(dw===0?6:dw-1));
  const wSun=new Date(wMon);wSun.setDate(wMon.getDate()+6);
  const wF=toDS(wMon),wT=toDS(wSun);
  const wRecs=act.filter(r=>r.date>=wF&&r.date<=wT);
  const wDays=Array.from({length:7},(_,i)=>{const d=new Date(wMon);d.setDate(wMon.getDate()+i);return d.getDay();}).filter(d=>d!==0&&d!==6).length;
  const wAdd=wRecs.filter(r=>isAdd(r.type)).reduce((s,r)=>s+r.hours,0);
  const wSub=wRecs.filter(r=>isSub(r.type)).reduce((s,r)=>s+r.hours,0);
  const thisWkH=Math.max(0,wDays*cfg.dailyH+wAdd-wSub);

  // ── 연차: 전체 기간 누적 ──
  // 기준점: 설정 or 휴가기준 시트의 '기준설정' 이벤트
  const annBase=getLeaveBase('연차');
  const annAdded=leaves.filter(l=>l.type==='연차'&&l.category==='추가발생').reduce((s,l)=>s+l.days,0);
  const annUsedRecs=recs.filter(r=>r.status==='확정').reduce((s,r)=>{
    if(r.type==='연차')return s+1;
    if(r.type==='반차')return s+0.5;
    return s;
  },0);
  const annUsedLv=leaves.filter(l=>l.type==='연차'&&l.category==='사용차감').reduce((s,l)=>s+l.days,0);
  const annTotal=annBase+annAdded;
  const annUsed=annUsedRecs+annUsedLv;
  const annRemain=annTotal-annUsed;

  // ── 보상휴가: 전체 기간 누적 ──
  const compBase=getLeaveBase('보상휴가');
  const compAdded=leaves.filter(l=>l.type==='보상휴가'&&l.category==='추가발생').reduce((s,l)=>s+l.days,0);
  const compUsedRecs=recs.filter(r=>r.type==='보상휴가'&&r.status==='확정').reduce((s,r)=>s+r.hours,0)/cfg.dailyH;
  const compUsedLv=leaves.filter(l=>l.type==='보상휴가'&&l.category==='사용차감').reduce((s,l)=>s+l.days,0);
  const compTotal=compBase+compAdded;
  const compUsed=compUsedRecs+compUsedLv;
  const compRemain=compTotal-compUsed;

  // ── 대체휴가: 휴일근무 발생 기반, 전체 누적 ──
  const holEarned=recs.filter(r=>r.type==='휴일근무'&&r.status==='확정').reduce((s,r)=>s+r.hours,0)/cfg.dailyH;
  const altUsed=recs.filter(r=>r.type==='대체휴무'&&r.status==='확정').reduce((s,r)=>s+r.hours,0)/cfg.dailyH;
  const altRemain=holEarned-altUsed;

  // ── 기타휴가: 전체 누적 ──
  const etcBase=getLeaveBase('기타휴가');
  const etcAdded=leaves.filter(l=>l.type==='기타휴가'&&l.category==='추가발생').reduce((s,l)=>s+l.days,0);
  const etcUsedLv=leaves.filter(l=>l.type==='기타휴가'&&l.category==='사용차감').reduce((s,l)=>s+l.days,0);
  const etcTotal=etcBase+etcAdded;
  const etcRemain=etcTotal-etcUsedLv;

  // ── 대체휴가 만료 (3개월) ──
  const holRecs=recs.filter(r=>r.type==='휴일근무'&&r.status==='확정');
  const expiring=holRecs.filter(r=>{const d=diffD(td,addM(r.date,3));return d>=0&&d<=30;});
  const expired=holRecs.filter(r=>diffD(td,addM(r.date,3))<0);

  // ── 이번 달 현황 ──
  const conf=mo.filter(r=>r.status==='확정').length;
  const plan=mo.filter(r=>r.status==='예정').length;
  const giA=mo.filter(r=>r.draft==='기완').length;
  const giB=mo.filter(r=>r.draft==='기전').length;
  const byT={};TL.forEach(t=>{byT[t]={h:0,cnt:0};});
  mo.forEach(r=>{if(byT[r.type]){byT[r.type].h+=r.hours;byT[r.type].cnt++;}});

  return{ot,thisWkH,
    annTotal,annUsed,annRemain,
    compTotal,compUsed,compRemain,
    holEarned,altUsed,altRemain,
    etcTotal,etcUsedLv,etcRemain,
    conf,plan,giA,giB,byT,
    act,mo,expiring,expired};
}

// 휴가 기준점 계산 (기준설정 이벤트 중 최신값)
function getLeaveBase(type){
  const items=leaves.filter(l=>l.type===type&&l.category==='기준설정').sort((a,b)=>b.date.localeCompare(a.date));
  if(items.length) return Number(items[0].days)||0;
  // 설정에서 fallback
  if(type==='연차') return Number(cfg.annualTotal)||15;
  if(type==='보상휴가') return Number(cfg.compTotal)||0;
  return 0;
}

function calcWeekly(){
  const[y,m]=fm.split('-').map(Number);
  const act=recs.filter(r=>showAll||r.status==='확정');
  const inM=ds=>{const[wy,wm]=ds.split('-').map(Number);return wy===y&&wm===m;};
  const weeks=[];
  const first=new Date(y,m-1,1);
  const dow0=first.getDay();
  const mon1=new Date(first);mon1.setDate(first.getDate()-(dow0===0?6:dow0-1));
  for(let w=0;w<6;w++){
    const wMon=new Date(mon1);wMon.setDate(mon1.getDate()+w*7);
    const wSun=new Date(wMon);wSun.setDate(wMon.getDate()+6);
    const wF=toDS(wMon),wT=toDS(wSun);
    const days=Array.from({length:7},(_,i)=>{const t=new Date(wMon);t.setDate(wMon.getDate()+i);return toDS(t);});
    if(!days.some(inM))continue;
    const wr=act.filter(r=>r.date>=wF&&r.date<=wT&&inM(r.date));
    const wkDays=days.filter(ds=>{const dw=new Date(ds+'T00:00:00').getDay();return dw!==0&&dw!==6&&inM(ds);}).length;
    const subH=wr.filter(r=>isSub(r.type)).reduce((s,r)=>s+r.hours,0);
    const extH=wr.filter(r=>r.type==='연장근무').reduce((s,r)=>s+r.hours,0);
    const nightH=wr.filter(r=>r.type==='야간근무').reduce((s,r)=>s+r.hours,0);
    const holH=wr.filter(r=>r.type==='휴일근무').reduce((s,r)=>s+r.hours,0);
    const etcH=wr.filter(r=>r.type==='기타').reduce((s,r)=>s+r.hours,0);
    const schedH=Math.max(0,wkDays*cfg.dailyH-subH);
    const total=schedH+extH+nightH+holH+etcH;
    const fl=`${wMon.getMonth()+1}/${wMon.getDate()}`,tl=`${wSun.getMonth()+1}/${wSun.getDate()}`;
    weeks.push({label:`${fl}~${tl}`,week:`${m}월 ${weeks.length+1}주차`,schedH,extH,nightH,holH,etcH,total});
  }
  return weeks;
}

function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k==='class')el.className=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  if(children)(Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return el;
}
function toast(msg,col){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=h('div',{class:'toast',style:{background:col||'#3B6D11'}},msg);
  document.body.appendChild(el);setTimeout(()=>el&&el.remove(),2800);
}
function showLoading(msg){
  document.querySelectorAll('.loading').forEach(e=>e.remove());
  const el=h('div',{class:'loading'},[h('div',{class:'spinner'}),h('div',{style:{fontSize:'13px',color:'var(--tx2)'}},msg||'처리 중...')]);
  document.body.appendChild(el);
}

function chip(type,sm){
  const c=TS[type]||TS['기타'];
  const el=h('span',{class:'chip',style:{background:c.bg,color:c.tx,borderColor:c.dot+'55',padding:sm?'2px 7px':'3px 9px',fontSize:sm?'10px':'11px'}});

  el.appendChild(document.createTextNode(type));
  return el;
}

function renderList(app,st){
  const vis=st.act.filter(r=>r.date.startsWith(fm)).sort((a,b)=>a.date.localeCompare(b.date));

  const last=new Date(y,m,0).getDate(),first=new Date(y,m-1,1);
  const cells=[];
  for(let i=0;i<first.getDay();i++)cells.push(null);
  for(let d=1;d<=last;d++){const ds=`${y}-${p2(m)}-${p2(d)}`;cells.push({d,ds,dw:new Date(ds+'T00:00:00').getDay(),recs:st.act.filter(r=>r.date===ds)});}
  const td_=todayDS();

  const calPanel=h('div',{class:'card cp'});
  calPanel.appendChild(h('div',{class:'ct'},`${y}년 ${m}월`));
  const cg=h('div',{class:'calgrid',style:{marginBottom:'8px'}});
  WD.forEach((w,i)=>cg.appendChild(h('div',{style:{textAlign:'center',fontSize:'10px',paddingBottom:'5px',fontWeight:'600',color:i===0?'#D85A30':i===6?'#378ADD':'var(--tx3)'}},w)));

    const tot=c.recs.reduce((s,r)=>s+r.hours,0);

    cell.appendChild(h('div',{style:{fontSize:'11px',marginBottom:'2px',fontWeight:isSel||isToday?'700':'400',color:c.dw===0?'#D85A30':c.dw===6?'#378ADD':'var(--tx)'}},`${c.d}`));

      top.append(chip(r.type,true),h('span',{style:{fontSize:'12px',fontWeight:'700',color:isSub(r.type)?'var(--bl)':'var(--am)'}},isSub(r.type)?`−${r.hours}h`:`+${r.hours}h`));

      const btns=h('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}});

// CSV 내보내기
// ══════════════════════════════════════════════════════
function doExport(){
  const[fy,fm2]=fm.split('-').map(Number);
  const from=expFrom||`${fm}-01`;
  const to=expTo||`${fm}-${new Date(fy,fm2,0).getDate()}`;
  const filt=recs.filter(r=>r.date>=from&&r.date<=to).sort((a,b)=>a.date.localeCompare(b.date));
  const weekly=calcWeekly();
  const st=calcStats();
  let csv=`[${cfg.name} 근태기록] ${from} ~ ${to}\n\n`;
  csv+='[상세기록]\n날짜,유형,내용,시간(h),가산/차감,기안,상태\n';
  filt.forEach(r=>{csv+=`${r.date},${r.type},"${r.memo}",${isSub(r.type)?-r.hours:r.hours},${isSub(r.type)?'차감':'가산'},${r.draft},${r.status}\n`;});
  csv+='\n[주간근로시간]\n이름,주차,해당일,소정근로시간(정상근무),초과근무(연장),야간근무(당직),휴일근무(시간),기타(프리데이 등),근무시간 계\n';
  weekly.forEach(w=>csv+=`${cfg.name},${w.week},${w.label},${w.schedH},${w.extH},${w.nightH},${w.holH},${w.etcH},${w.total}\n`);
  csv+=`,합계,,${weekly.reduce((s,w)=>s+w.schedH,0)},${weekly.reduce((s,w)=>s+w.extH,0)},${weekly.reduce((s,w)=>s+w.nightH,0)},${weekly.reduce((s,w)=>s+w.holH,0)},${weekly.reduce((s,w)=>s+w.etcH,0)},${weekly.reduce((s,w)=>s+w.total,0)}\n`;
  csv+='\n[휴가현황 — 전체 누적]\n구분,기준(일),사용(일),잔여(일)\n';
  csv+=`연차,${st.annTotal.toFixed(1)},${st.annUsed.toFixed(1)},${st.annRemain.toFixed(1)}\n`;
  csv+=`보상휴가,${st.compTotal.toFixed(1)},${st.compUsed.toFixed(1)},${st.compRemain.toFixed(1)}\n`;
  csv+=`대체휴가,${st.holEarned.toFixed(1)},${st.altUsed.toFixed(1)},${st.altRemain.toFixed(1)}\n`;
  csv+='\n[휴가 이벤트 로그]\n날짜,구분,유형,일수,메모\n';
  leaves.sort((a,b)=>a.date.localeCompare(b.date)).forEach(l=>csv+=`${l.date},${l.category},${l.type},${l.days},"${l.memo}"\n`);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`근태_${fm}_${cfg.name}.csv`;a.click();
  toast('CSV 저장 완료 ✓');
}

const GAS_CODE = `// 근태관리 앱 — Google Apps Script
// 구글 시트 ID: 11kGeq5p35dVx_A4nojCgkZ-OsbEzaWRk8mtR5dr8liY
const SS_ID = '11kGeq5p35dVx_A4nojCgkZ-OsbEzaWRk8mtR5dr8liY';

function doGet(e) {
  try {
    const ss = SpreadsheetApp.openById(SS_ID);
    const action = e.parameter.action || 'ping';
    if (action === 'ping') return res({status:'ok'});
    if (action === 'load') return res(loadAll(ss));
    if (action === 'init') return res(initSheets(ss));
  } catch(err) { return res({status:'error',message:err.message}); }
}

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    const ss   = SpreadsheetApp.openById(SS_ID);
    const act  = data.action;
    if (act==='init')            return res(initSheets(ss));
    if (act==='saveConfig')      return res(saveConfig(ss, data.config));
    if (act==='addRecord')       return res(addRecord(ss, data.record));
    if (act==='updateRecord')    return res(updateRecord(ss, data.record));
    if (act==='deleteRecord')    return res(deleteRecord(ss, data.id));
    if (act==='addLeaveEvent')   return res(addLeaveEvent(ss, data.event));
    if (act==='deleteLeaveEvent')return res(deleteLeaveEvent(ss, data.id));
    if (act==='load')            return res(loadAll(ss));
    return res({status:'error',message:'unknown action'});
  } catch(err) { return res({status:'error',message:err.message}); }
}

function initSheets(ss) {
  makeSheet(ss,'설정',  [['키','값','설명'],['name','김숙희','이름'],['annualTotal',15,'연차기준'],['compTotal',0,'보상휴가기준'],['otLimit',20,'월시간외한도'],['weekLimit',52,'주근무한도'],['dailyH',8,'일소정근로']]);
  makeSheet(ss,'휴가기준',[['id','날짜','구분','유형','시간(h)','일수','메모'],['LV001','2026-01-01','기준설정','연차',0,15,'2026 연차기준'],['LV002','2026-01-01','기준설정','보상휴가',0,0,'2026 보상휴가기준']]);
  makeSheet(ss,'기록',  [['id','날짜','유형','메모','시간(h)','기안','상태','생성일시']]);
  makeSheet(ss,'현황',  [['항목','값']]);
  return {status:'ok',message:'초기화완료'};
}

function makeSheet(ss, name, rows) {
  let sh = ss.getSheetByName(name);
  if (!sh) { sh = ss.insertSheet(name); sh.setFrozenRows(1); }
  else { sh.clearContents(); }
  sh.getRange(1,1,rows.length,rows[0].length).setValues(rows);
  sh.getRange(1,1,1,rows[0].length).setFontWeight('bold').setBackground('#EAF3DE').setFontColor('#3B6D11');
  return sh;
}

function loadAll(ss) {
  return {status:'ok', config:loadConfig(ss), records:loadRecords(ss), leaves:loadLeaves(ss)};
}

function loadConfig(ss) {
  const sh=ss.getSheetByName('설정'); if(!sh)return{};
  const d=sh.getRange(2,1,Math.max(sh.getLastRow()-1,1),3).getValues();
  const c={}; d.forEach(([k,,v])=>{if(k)c[k]=v;}); return c;
}

function saveConfig(ss,config) {
  const sh=ss.getSheetByName('설정'); if(!sh)return{status:'error'};
  const d=sh.getRange(2,1,sh.getLastRow()-1,3).getValues();
  d.forEach((row,i)=>{if(config.hasOwnProperty(row[0]))sh.getRange(i+2,2).setValue(config[row[0]]);});
  return {status:'ok'};
}

function loadRecords(ss) {
  const sh=ss.getSheetByName('기록'); if(!sh||sh.getLastRow()<2)return[];
  return sh.getRange(2,1,sh.getLastRow()-1,8).getValues()
    .filter(r=>r[0]).map(([id,date,type,memo,hours,draft,status,created])=>
      ({id:String(id),date:fmt(date),type,memo,hours:Number(hours),draft,status,created:fmt(created)}));
}

function addRecord(ss,rec) {
  const sh=ss.getSheetByName('기록'); if(!sh)return{status:'error'};
  const id=rec.id||'R'+Date.now();
  const now=Utilities.formatDate(new Date(),'Asia/Seoul','yyyy-MM-dd HH:mm:ss');
  sh.appendRow([id,rec.date,rec.type,rec.memo,rec.hours,rec.draft,rec.status,now]);
  return {status:'ok',id};
}

function updateRecord(ss,rec) {
  const sh=ss.getSheetByName('기록'); if(!sh)return{status:'error'};
  const d=sh.getRange(2,1,sh.getLastRow()-1,1).getValues();
  const i=d.findIndex(r=>String(r[0])===String(rec.id)); if(i<0)return{status:'error'};
  sh.getRange(i+2,2,1,6).setValues([[rec.date,rec.type,rec.memo,rec.hours,rec.draft,rec.status]]);
  return {status:'ok'};
}

function deleteRecord(ss,id) {
  const sh=ss.getSheetByName('기록'); if(!sh)return{status:'error'};
  const d=sh.getRange(2,1,sh.getLastRow()-1,1).getValues();
  const i=d.findIndex(r=>String(r[0])===String(id)); if(i<0)return{status:'error'};
  sh.deleteRow(i+2); return {status:'ok'};
}

function loadLeaves(ss) {
  const sh=ss.getSheetByName('휴가기준'); if(!sh||sh.getLastRow()<2)return[];
  return sh.getRange(2,1,sh.getLastRow()-1,7).getValues()
    .filter(r=>r[0]).map(([id,date,category,type,hours,days,memo])=>
      ({id:String(id),date:fmt(date),category,type,hours:Number(hours),days:Number(days),memo}));
}

function addLeaveEvent(ss,ev) {
  const sh=ss.getSheetByName('휴가기준'); if(!sh)return{status:'error'};
  const id=ev.id||'LV'+Date.now();
  sh.appendRow([id,ev.date,ev.category,ev.type,ev.hours||0,ev.days||0,ev.memo||'']);
  return {status:'ok',id};
}

function deleteLeaveEvent(ss,id) {
  const sh=ss.getSheetByName('휴가기준'); if(!sh)return{status:'error'};
  const d=sh.getRange(2,1,sh.getLastRow()-1,1).getValues();
  const i=d.findIndex(r=>String(r[0])===String(id)); if(i<0)return{status:'error'};
  sh.deleteRow(i+2); return {status:'ok'};
}

function fmt(v) {
  if(!v)return'';
  if(v instanceof Date)return Utilities.formatDate(v,'Asia/Seoul','yyyy-MM-dd');
  return String(v).slice(0,10);
}

function res(obj) {
  const out=ContentService.createTextOutput(JSON.stringify(obj));
  out.setMimeType(ContentService.MimeType.JSON);
  return out;
}`;

render();
